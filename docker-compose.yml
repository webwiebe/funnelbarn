name: funnelbarn

services:
  service:
    build:
      context: .
      dockerfile: deploy/docker/service.Dockerfile
    image: funnelbarn/service:local
    ports:
      - "8080:8080"
    environment:
      FUNNELBARN_ADDR: :8080
      FUNNELBARN_API_KEY: local-dev-key
      FUNNELBARN_SPOOL_DIR: /var/lib/funnelbarn/spool
      FUNNELBARN_DB_PATH: /var/lib/funnelbarn/funnelbarn.db
      FUNNELBARN_ADMIN_USERNAME: admin
      FUNNELBARN_ADMIN_PASSWORD: admin
    volumes:
      - funnelbarn-data:/var/lib/funnelbarn

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    image: funnelbarn/web:local
    ports:
      - "3000:3000"
    depends_on:
      - service

volumes:
  funnelbarn-data:
