version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - goimports
    - misspell
  settings:
    goimports:
      local-prefixes:
        - github.com/wiebe-xyz/funnelbarn
issues:
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
