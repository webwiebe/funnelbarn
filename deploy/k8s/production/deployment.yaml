apiVersion: apps/v1
kind: Deployment
metadata:
  name: funnelbarn
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: funnelbarn
      app.kubernetes.io/environment: production
  template:
    metadata:
      labels:
        app.kubernetes.io/name: funnelbarn
        app.kubernetes.io/environment: production
    spec:
      nodeSelector:
        kubernetes.io/hostname: layer7-prod
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: geoipupdate
          image: ghcr.io/maxmind/geoipupdate:v7.1.1
          env:
            - name: GEOIPUPDATE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: GEOIPUPDATE_ACCOUNT_ID
            - name: GEOIPUPDATE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: GEOIPUPDATE_LICENSE_KEY
            - name: GEOIPUPDATE_EDITION_IDS
              value: GeoLite2-City GeoLite2-ASN
            - name: GEOIPUPDATE_DB_DIR
              value: /var/lib/funnelbarn/geoip
          volumeMounts:
            - name: funnelbarn-data
              mountPath: /var/lib/funnelbarn
        # local-path PVCs do not honor pod-level fsGroup, so explicitly make the
        # GeoLite2 dbs (written by geoipupdate as root, dir mode 0750) readable by
        # the non-root service user. They are public MaxMind data, so a+r is fine.
        - name: geoip-perms
          image: ghcr.io/maxmind/geoipupdate:v7.1.1
          command: ["chmod", "-R", "a+rX", "/var/lib/funnelbarn/geoip"]
          volumeMounts:
            - name: funnelbarn-data
              mountPath: /var/lib/funnelbarn
      containers:
        - name: funnelbarn
          image: funnelbarn/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FUNNELBARN_ADDR
              value: :8080
            - name: FUNNELBARN_PUBLIC_URL
              value: https://funnelbarn.wiebe.xyz
            - name: FUNNELBARN_SPOOL_DIR
              value: /var/lib/funnelbarn/spool
            - name: FUNNELBARN_DB_PATH
              value: /var/lib/funnelbarn/funnelbarn.db
            - name: FUNNELBARN_MAX_SPOOL_BYTES
              value: "104857600"
            - name: FUNNELBARN_SESSION_TTL_SECONDS
              value: "86400"
            - name: LITESTREAM_REPLICA_PATH
              value: production/funnelbarn.db
            - name: FUNNELBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_API_KEY
            - name: FUNNELBARN_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ADMIN_USERNAME
                  optional: true
            - name: FUNNELBARN_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: FUNNELBARN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SESSION_SECRET
                  optional: true
            - name: FUNNELBARN_SELF_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SELF_ENDPOINT
                  optional: true
            - name: FUNNELBARN_SELF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SELF_API_KEY
                  optional: true
            - name: FUNNELBARN_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ENVIRONMENT
                  optional: true
            - name: FUNNELBARN_DOGFOOD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_DOGFOOD_API_KEY
                  optional: true
            - name: FUNNELBARN_DOGFOOD_PROJECT
              value: funnelbarn
            - name: FUNNELBARN_R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_R2_ENDPOINT
                  optional: true
            - name: FUNNELBARN_R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_R2_ACCESS_KEY_ID
                  optional: true
            - name: FUNNELBARN_R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_R2_SECRET_ACCESS_KEY
                  optional: true
            - name: FUNNELBARN_R2_BUCKET
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_R2_BUCKET
                  optional: true
            - name: FUNNELBARN_SPANBARN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SPANBARN_ENDPOINT
                  optional: true
            - name: FUNNELBARN_SPANBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SPANBARN_API_KEY
                  optional: true
            - name: FUNNELBARN_IAMBARN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_IAMBARN_CLIENT_ID
                  optional: true
            - name: FUNNELBARN_OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_OIDC_ISSUER
                  optional: true
            - name: FUNNELBARN_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_OIDC_CLIENT_ID
                  optional: true
            - name: FUNNELBARN_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_OIDC_CLIENT_SECRET
                  optional: true
            - name: FUNNELBARN_OIDC_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_OIDC_REDIRECT_URL
                  optional: true
            - name: FUNNELBARN_GEOIP_CITY_DB
              value: /var/lib/funnelbarn/geoip/GeoLite2-City.mmdb
            - name: FUNNELBARN_GEOIP_ASN_DB
              value: /var/lib/funnelbarn/geoip/GeoLite2-ASN.mmdb
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: funnelbarn-data
              mountPath: /var/lib/funnelbarn
      volumes:
        - name: funnelbarn-data
          persistentVolumeClaim:
            claimName: funnelbarn-data
