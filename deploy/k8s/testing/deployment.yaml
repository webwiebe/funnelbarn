apiVersion: apps/v1
kind: Deployment
metadata:
  name: trailpost
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: trailpost
      app.kubernetes.io/environment: testing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trailpost
        app.kubernetes.io/environment: testing
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: trailpost
          image: trailpost/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TRAILPOST_ADDR
              value: :8080
            - name: TRAILPOST_PUBLIC_URL
              value: https://analytics-testing.wiebe.xyz
            - name: TRAILPOST_SPOOL_DIR
              value: /var/lib/trailpost/spool
            - name: TRAILPOST_DB_PATH
              value: /var/lib/trailpost/trailpost.db
            - name: TRAILPOST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trailpost-secrets
                  key: TRAILPOST_API_KEY
            - name: TRAILPOST_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trailpost-secrets
                  key: TRAILPOST_ADMIN_USERNAME
                  optional: true
            - name: TRAILPOST_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: trailpost-secrets
                  key: TRAILPOST_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: TRAILPOST_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: trailpost-secrets
                  key: TRAILPOST_SESSION_SECRET
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: trailpost-data
              mountPath: /var/lib/trailpost
      volumes:
        - name: trailpost-data
          persistentVolumeClaim:
            claimName: trailpost-data
