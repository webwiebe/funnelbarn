apiVersion: apps/v1
kind: Deployment
metadata:
  name: funnelbarn
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: funnelbarn
      app.kubernetes.io/environment: testing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: funnelbarn
        app.kubernetes.io/environment: testing
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: funnelbarn
          image: funnelbarn/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FUNNELBARN_ADDR
              value: :8080
            - name: FUNNELBARN_PUBLIC_URL
              value: https://funnelbarn.test.wiebe.xyz
            - name: FUNNELBARN_SPOOL_DIR
              value: /var/lib/funnelbarn/spool
            - name: FUNNELBARN_DB_PATH
              value: /var/lib/funnelbarn/funnelbarn.db
            - name: FUNNELBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_API_KEY
            - name: FUNNELBARN_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ADMIN_USERNAME
                  optional: true
            - name: FUNNELBARN_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: FUNNELBARN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SESSION_SECRET
                  optional: true
            - name: FUNNELBARN_SELF_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SELF_ENDPOINT
                  optional: true
            - name: FUNNELBARN_SELF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_SELF_API_KEY
                  optional: true
            - name: FUNNELBARN_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: funnelbarn-secrets
                  key: FUNNELBARN_ENVIRONMENT
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: funnelbarn-data
              mountPath: /var/lib/funnelbarn
      volumes:
        - name: funnelbarn-data
          persistentVolumeClaim:
            claimName: funnelbarn-data
