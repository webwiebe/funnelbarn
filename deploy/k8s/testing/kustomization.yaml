apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: funnelbarn-testing
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - web-deployment.yaml
  - service.yaml
  - web-service.yaml
  - ingress.yaml
images:
  - name: funnelbarn/service
    newName: ghcr.io/webwiebe/funnelbarn/service
    newTag: local
  - name: funnelbarn/web
    newName: ghcr.io/webwiebe/funnelbarn/web
    newTag: local
