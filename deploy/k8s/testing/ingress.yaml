apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: funnelbarn
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: funnelbarn.test.wiebe.xyz
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: funnelbarn
                port:
                  name: http
          - path: /.well-known/iambarn-theme.json
            pathType: Exact
            backend:
              service:
                name: funnelbarn
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: funnelbarn-web
                port:
                  name: http
    # Legacy host — kept during the migration so existing consumers keep
    # working until they roll out with the new URL. Drop once everything
    # has moved over.
    - host: funnelbarn-test.nijmegen.wiebe.xyz
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: funnelbarn
                port:
                  name: http
          - path: /.well-known/iambarn-theme.json
            pathType: Exact
            backend:
              service:
                name: funnelbarn
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: funnelbarn-web
                port:
                  name: http
  tls:
    - hosts:
        - funnelbarn.test.wiebe.xyz
        - funnelbarn-test.nijmegen.wiebe.xyz
