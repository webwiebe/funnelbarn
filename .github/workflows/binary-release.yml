name: Binary Release

# Builds and publishes funnelbarn binaries on every push to main.
# Publishes to:
#   - APT repository:      https://webwiebe.nl/apt/ (via rapid-root centralized workflow)
#   - Homebrew tap (MinIO): https://webwiebe.nl/brew/funnelbarn-darwin-*.tar.gz
#   - GitHub Releases:     attached .deb and .tar.gz files

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next_version.outputs.version }}
      version_num: ${{ steps.next_version.outputs.version_num }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG=${{ steps.latest_tag.outputs.tag }}
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_num=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          NEW_VERSION=${{ steps.next_version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"
          git push origin "${NEW_VERSION}"

  upload-source-maps:
    name: Build Web UI and Upload Source Maps to BugBarn
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Build web UI
        run: npm run build --prefix web

      - name: Upload source maps to BugBarn
        if: vars.BUGBARN_ENDPOINT != ''
        env:
          BUGBARN_ENDPOINT: ${{ vars.BUGBARN_ENDPOINT }}
          BUGBARN_API_KEY: ${{ secrets.FUNNELBARN_BUGBARN_API_KEY }}
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          for mapfile in web/dist/assets/*.map; do
            [ -f "$mapfile" ] || continue
            echo "Uploading ${mapfile}..."
            curl -sf -X POST "${BUGBARN_ENDPOINT}/api/v1/source-maps" \
              -H "X-BugBarn-Api-Key: ${BUGBARN_API_KEY}" \
              -F "project_slug=funnelbarn" \
              -F "version=${VERSION}" \
              -F "file=@${mapfile}" || echo "Source map upload skipped for ${mapfile}"
          done

  build-debs:
    name: Build .deb Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build binary
        env:
          GOOS: linux
          VERSION: ${{ needs.tag.outputs.version_num }}
        run: |
          GOARCH="${{ matrix.arch }}"
          export GOARCH
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X main.Version=v${VERSION} -X main.BuildTime=${BUILD_TIME}"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/funnelbarn-linux-${GOARCH} ./cmd/funnelbarn

      - name: Build .deb package
        env:
          VERSION: ${{ needs.tag.outputs.version_num }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p debs
          envsubst < nfpm-funnelbarn.yaml > nfpm-funnelbarn-processed.yaml
          nfpm package \
            --config nfpm-funnelbarn-processed.yaml \
            --packager deb \
            --target debs/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: debs/*.deb
          retention-days: 30

  build-darwin-tarballs:
    name: Build macOS Tarballs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build macOS binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.tag.outputs.version_num }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X main.Version=v${VERSION} -X main.BuildTime=${BUILD_TIME}"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/funnelbarn ./cmd/funnelbarn
          TARBALL="funnelbarn-darwin-${{ matrix.arch }}-${VERSION}.tar.gz"
          tar -czvf dist/${TARBALL} -C dist funnelbarn
          rm dist/funnelbarn

      - name: Generate checksums
        run: |
          cd dist
          for f in *.tar.gz; do sha256sum "$f" > "${f}.sha256"; done

      - name: Upload tarball artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: dist/*.tar.gz*
          retention-days: 30

  attach-debs-to-release:
    name: Attach .deb to Release
    runs-on: ubuntu-latest
    needs: [tag, build-debs]
    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs-download

      - name: Prepare release files
        run: |
          mkdir -p release
          find debs-download -name "*.deb" -exec cp {} release/ \;
          cd release && sha256sum *.deb > checksums-deb.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger rapid-root APT repository update
        env:
          GH_TOKEN: ${{ secrets.RAPID_ROOT_DISPATCH_TOKEN }}
        run: |
          gh api repos/wiebe-xyz/rapid-root/dispatches \
            --method POST \
            --field event_type=apt-package-update \
            --field 'client_payload[repo]=webwiebe/funnelbarn' \
            --field 'client_payload[tag]=${{ needs.tag.outputs.version }}' \
            --field 'client_payload[asset_pattern]=*.deb'

  attach-tarballs-to-release:
    name: Attach macOS Tarballs to Release
    runs-on: ubuntu-latest
    needs: [tag, build-darwin-tarballs]
    steps:
      - name: Download all darwin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: darwin-*
          path: darwin-download

      - name: Prepare release files
        run: |
          mkdir -p release
          find darwin-download -name "*.tar.gz" -exec cp {} release/ \;
          find darwin-download -name "*.sha256" -exec cp {} release/ \;

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-brew-repo:
    name: Update Homebrew Tap (MinIO)
    runs-on: ubuntu-latest
    needs: [tag, build-darwin-tarballs]
    steps:
      - name: Download all darwin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: darwin-*
          path: darwin-download

      - name: Prepare brew repository
        env:
          VERSION: ${{ needs.tag.outputs.version_num }}
        run: |
          mkdir -p brew-repo/Formula
          find darwin-download -name "*.tar.gz" -exec cp {} brew-repo/ \;
          find darwin-download -name "*.sha256" -exec cp {} brew-repo/ \;

          AMD64_SHA=$(cat brew-repo/funnelbarn-darwin-amd64-${VERSION}.tar.gz.sha256 | awk '{print $1}')
          ARM64_SHA=$(cat brew-repo/funnelbarn-darwin-arm64-${VERSION}.tar.gz.sha256 | awk '{print $1}')

          cat > brew-repo/Formula/funnelbarn.rb << EOF
          class Funnelbarn < Formula
            desc "Self-hosted web analytics server"
            homepage "https://github.com/wiebe-xyz/funnelbarn"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://webwiebe.nl/brew/funnelbarn-darwin-amd64-${VERSION}.tar.gz"
                sha256 "${AMD64_SHA}"
              elsif Hardware::CPU.arm?
                url "https://webwiebe.nl/brew/funnelbarn-darwin-arm64-${VERSION}.tar.gz"
                sha256 "${ARM64_SHA}"
              end
            end

            def install
              bin.install "funnelbarn"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/funnelbarn version")
            end
          end
          EOF

      - name: Deploy to MinIO (brew/ prefix)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          pip install awscli
          aws --endpoint-url "$AWS_ENDPOINT_URL" s3 sync \
            brew-repo/ \
            s3://${MINIO_BUCKET}/brew/ \
            --cache-control "public, max-age=3600, must-revalidate"

  update-homebrew-tap:
    name: Update GitHub Tap Repository
    runs-on: ubuntu-latest
    needs: [tag, update-brew-repo]
    steps:
      - name: Download darwin artifacts for checksums
        uses: actions/download-artifact@v4
        with:
          pattern: darwin-*
          path: darwin-download

      - name: Generate formula and push to tap
        env:
          VERSION: ${{ needs.tag.outputs.version_num }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "ERROR: TAP_GITHUB_TOKEN secret is required"
            exit 1
          fi

          AMD64_SHA=$(cat darwin-download/darwin-amd64/funnelbarn-darwin-amd64-${VERSION}.tar.gz.sha256 | awk '{print $1}')
          ARM64_SHA=$(cat darwin-download/darwin-arm64/funnelbarn-darwin-arm64-${VERSION}.tar.gz.sha256 | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/webwiebe/homebrew-funnelbarn.git tap-repo
          cd tap-repo
          mkdir -p Formula

          cat > Formula/funnelbarn.rb << EOF
          class Funnelbarn < Formula
            desc "Self-hosted web analytics server"
            homepage "https://github.com/wiebe-xyz/funnelbarn"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://webwiebe.nl/brew/funnelbarn-darwin-amd64-${VERSION}.tar.gz"
                sha256 "${AMD64_SHA}"
              elsif Hardware::CPU.arm?
                url "https://webwiebe.nl/brew/funnelbarn-darwin-arm64-${VERSION}.tar.gz"
                sha256 "${ARM64_SHA}"
              end
            end

            def install
              bin.install "funnelbarn"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/funnelbarn version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/funnelbarn.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update formula to ${VERSION}"
            git push
          fi
