name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: go fmt
        run: |
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "Files not formatted:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...

      - name: cyclomatic complexity gate
        # Fail if any function exceeds a cyclomatic complexity of 50. This is a
        # regression ceiling set just above today's worst offenders (config.Load,
        # main.run) — the intent is to ratchet it DOWN over time as the flagged
        # analytics/startup functions are decomposed, never up. Generated and
        # test code is excluded.
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 50 -ignore '_test|sqlcgen|/mock/' internal cmd

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Go tests with race detector
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage gate (service + repository ≥ 60%)
        run: |
          go test -coverprofile=svc-coverage.out ./internal/service/... ./internal/repository 2>/dev/null || true
          go tool cover -func=svc-coverage.out | tail -1 | awk '{pct=$3+0; if(pct<60){printf "Coverage %.1f%% is below 60%% threshold\n", pct; exit 1}}'

      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build SDK
        working-directory: sdks/js
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: TypeScript typecheck
        working-directory: web
        run: npm run lint

      - name: ESLint
        working-directory: web
        run: npm run lint:eslint

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build SDK
        working-directory: sdks/js
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Run Vitest
        working-directory: web
        run: npm test
