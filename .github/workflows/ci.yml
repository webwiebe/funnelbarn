name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: go fmt
        run: |
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "Files not formatted:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...

      - name: Go quality ratchets (complexity / file length / duplication)
        # Cyclomatic complexity, file length, and code duplication — each pinned
        # at today's worst value. They may only ratchet DOWN. See the script.
        run: bash scripts/go-quality-gates.sh

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Go tests with race detector
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage ratchet (per-file / per-package / global)
        # Fails if ANY first-party file is 0% covered, if any package drops below
        # its committed floor, or if global coverage drops. Floors are pinned at
        # current in scripts/coverage-baseline.txt (raise, never lower).
        run: python3 scripts/coverage-gate.py

      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build SDK
        working-directory: sdks/js
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: TypeScript typecheck
        working-directory: web
        run: npm run lint

      - name: ESLint
        working-directory: web
        run: npm run lint:eslint

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build SDK
        working-directory: sdks/js
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Run Vitest with coverage ratchet
        # vitest enforces the per-metric coverage floors (all:true) from
        # vite.config.ts; pinned at current, raise-only.
        working-directory: web
        run: npm run test:coverage

      - name: Per-file coverage ratchet (no new uncovered files)
        working-directory: web
        run: npm run gate:coverage-perfile

      - name: Duplication ratchet (jscpd)
        working-directory: web
        run: npm run gate:duplication
